<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtacadoCentral - Login Corporativo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark">

    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="login-logo">Atacado<span>Central</span></a>
            <h2>Portal do Comprador</h2>
            <p>Acesse para visualizar preços de fábrica e condições de faturamento.</p>
            
            <form action="orders.html" class="login-form">
                <div class="form-group">
                    <label for="cnpj">CNPJ da Empresa</label>
                    <input type="text" id="cnpj" placeholder="00.000.000/0001-00" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha Corporativa</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-actions">
                    <label><input type="checkbox"> Lembrar CNPJ</label>
                    <a href="#">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-primary w-100">Entrar no Painel de Estoque</button>
            </form>
            
            <div class="login-footer">
                <p>Sua empresa ainda não tem cadastro? <a href="#">Criar Conta PJ</a></p>
            </div>
        </div>
    </div>

</body>
</html>
